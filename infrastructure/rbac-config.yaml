#Precisa criar uma ServiceAccount, um Role (com permissões de patch e update em deployments) e um RoleBinding. 
# Sem isso, o executor.py retornará erro 403 (Forbidden). 
# precisa para o executor funcionar 

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default
  name: py-scaler-role
rules:
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale"]
  verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: py-scaler-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: default # a conta que o script usa
roleRef:
  kind: Role
  name: py-scaler-role
  apiGroup: rbac.authorization.k8s.io