apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: product-catalog-delay
spec:
  hosts:
  - productcatalogservice
  http:
  - fault:
      delay:
        percentage:
          value: 100.0
        fixedDelay: 2.5s # Adiciona 2.5 segundos de atraso fixo
    route:
    - destination:
        host: productcatalogservice